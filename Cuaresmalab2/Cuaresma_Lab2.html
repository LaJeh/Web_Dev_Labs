<!DOCTYPE html>
<html>
<head>
  <title>My Diary</title>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>

  <h2 id="myDiaryText">My Diary</h2>

  <form class="diary-form">
    <label for="date">Date:</label>
    <input type="date" id="date" name="date" placeholder="dd/mm/yyyy">

    <label for="feelings">How are you feeling?</label>
    <input type="text" id="feelings" name="feelings">

    <label for="entry">Entry:</label>
    <textarea id="entry" name="entry"></textarea>

    <input type="submit" value="Submit">
  </form>

  <h2 id= "diaryEntry"> Diary Entry</h2>

</body>
</html>
